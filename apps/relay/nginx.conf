server {
    listen 443 ssl http2;
    server_name relay.theobase.net;

    ssl_certificate     /etc/letsencrypt/live/relay.theobase.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.theobase.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Rate limiting: 30 POSTs/minute per IP (magic link + notification endpoints)
    limit_req_zone $binary_remote_addr zone=relay:10m rate=30r/m;
    limit_req zone=relay burst=10 nodelay;
    limit_req_status 429;

    location / {
        proxy_pass http://relay:3113;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://relay:3113/health;
        proxy_http_version 1.1;
        limit_req off;
    }
}

server {
    listen 80;
    server_name relay.theobase.net;
    return 301 https://$host$request_uri;
}
