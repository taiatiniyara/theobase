name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx vitest run --config vitest.shared.config.ts

      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/auth.test.ts
      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/congregation.test.ts
      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/departments.test.ts
      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/finance.test.ts
      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/governance.test.ts
      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/member.test.ts
      - run: npx vitest run --config vitest.config.ts apps/api/src/__tests__/operations.test.ts
