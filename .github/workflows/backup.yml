name: D1 Backup

on:
  schedule:
    - cron: "0 4 * * *" # Daily at 4 AM UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create D1 backup (Cloudflare-managed)
        run: pnpm exec wrangler d1 backup create theobase-spd
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Export D1 data as SQL dump
        run: |
          pnpm exec wrangler d1 export theobase-spd \
            --remote \
            --output /tmp/theobase-backup.sql \
            --no-schema
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: theobase-d1-backup-${{ github.run_id }}
          path: /tmp/theobase-backup.sql
          retention-days: 90
          if-no-files-found: warn
