name: Deploy SMTP Relay

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/relay/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY || 'ghcr.io' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/relay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/smtp-relay:latest
            ghcr.io/${{ github.repository }}/smtp-relay:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: vars.RELAY_HOST != ''
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.RELAY_HOST }}
          username: ${{ vars.RELAY_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}/smtp-relay:latest
            cd /opt/theobase-relay
            docker compose up -d --force-recreate smtp-relay
